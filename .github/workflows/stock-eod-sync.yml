name: Stock EOD Sync

on:
  workflow_dispatch:
  schedule:
    - cron: '45 6 * * 1-5'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Sync official EOD quotes
        env:
          FIREBASE_DATABASE_URL: https://moze-lite-default-rtdb.firebaseio.com
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: node scripts/sync-stock-eod.mjs
